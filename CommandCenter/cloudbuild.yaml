# Cloud Build CI/CD pipeline for Learning Command Center
# Builds and deploys Api, Web, and Workers to Cloud Run on every push to main.
#
# Required substitutions (set in Cloud Build trigger):
#   _REGION          - e.g. us-central1
#   _PROJECT_ID      - GCP project ID
#   _SQL_INSTANCE    - Cloud SQL instance connection name
#   _DB_NAME         - PostgreSQL database name
#   _DB_USER         - PostgreSQL user
#   _DB_PASSWORD     - PostgreSQL password

substitutions:
  _REGION: us-central1
  _PROJECT_ID: qwiklabs-gcp-01-c8623a386b8c
  _SQL_INSTANCE: qwiklabs-gcp-01-c8623a386b8c:us-central1:command-center-mvp
  _DB_NAME: commandcenter
  _DB_USER: fsi-hackation-admin
  _DB_PASSWORD: PesQN8JMZF76iniKlrCYTeLF
  _API_SERVICE: command-center-api
  _WEB_SERVICE: command-center-web
  _WORKERS_SERVICE: command-center-workers
  _COMPUTE_SA: 366531512101-compute@developer.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ── 0a. Create db-connection-string secret (idempotent) ────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: create-secret-connstring
    entrypoint: bash
    args:
      - -c
      - |
        if ! gcloud secrets describe db-connection-string --project=$_PROJECT_ID >/dev/null 2>&1; then
          echo -n "Host=/cloudsql/$_SQL_INSTANCE;Database=$_DB_NAME;Username=$_DB_USER;Password=$_DB_PASSWORD" | \
            gcloud secrets create db-connection-string --project=$_PROJECT_ID --data-file=-
        else
          echo "Secret db-connection-string already exists, updating..."
          echo -n "Host=/cloudsql/$_SQL_INSTANCE;Database=$_DB_NAME;Username=$_DB_USER;Password=$_DB_PASSWORD" | \
            gcloud secrets versions add db-connection-string --project=$_PROJECT_ID --data-file=-
        fi
    waitFor: ["-"]

  # ── 0b. Create db-password secret (idempotent) ────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: create-secret-dbpass
    entrypoint: bash
    args:
      - -c
      - |
        if ! gcloud secrets describe db-password --project=$_PROJECT_ID >/dev/null 2>&1; then
          echo -n "$_DB_PASSWORD" | \
            gcloud secrets create db-password --project=$_PROJECT_ID --data-file=-
        else
          echo "Secret db-password already exists, skipping."
        fi
    waitFor: ["-"]

  # ── 0c. Grant Cloud Run SA access to secrets ──────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: iam-secret-bindings
    entrypoint: bash
    args:
      - -c
      - |
        for SECRET in db-connection-string db-password; do
          gcloud secrets add-iam-policy-binding $$SECRET \
            --project=$_PROJECT_ID \
            --member="serviceAccount:$_COMPUTE_SA" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet
        done
    waitFor: [create-secret-connstring, create-secret-dbpass]

  # ── 0d. Ensure Cloud Run SA has Cloud SQL Client role ─────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: iam-cloudsql-binding
    entrypoint: gcloud
    args:
      - projects
      - add-iam-policy-binding
      - $_PROJECT_ID
      - --member=serviceAccount:$_COMPUTE_SA
      - --role=roles/cloudsql.client
      - --quiet
    waitFor: ["-"]

  # ── 1. Restore & Test ─────────────────────────────────────────────────────
  - name: mcr.microsoft.com/dotnet/sdk:10.0
    id: test
    dir: CommandCenter
    entrypoint: dotnet
    args:
      - test
      - tests/CommandCenter.UnitTests/CommandCenter.UnitTests.csproj
      - --configuration
      - Release
      - --logger
      - trx
    waitFor: ["-"]

  # ── 2. Build Api image ────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-api
    dir: CommandCenter
    args:
      - build
      - -f
      - Dockerfile.Api
      - -t
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_API_SERVICE:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_API_SERVICE:latest
      - .
    waitFor: [test]

  # ── 3. Build Web image ────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-web
    dir: CommandCenter
    args:
      - build
      - -f
      - Dockerfile.Web
      - -t
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WEB_SERVICE:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WEB_SERVICE:latest
      - .
    waitFor: [test]

  # ── 4. Build Workers image ────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-workers
    dir: CommandCenter
    args:
      - build
      - -f
      - Dockerfile.Workers
      - -t
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WORKERS_SERVICE:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WORKERS_SERVICE:latest
      - .
    waitFor: [test]

  # ── 5. Push images ────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-api
    args: [push, --all-tags, $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_API_SERVICE]
    waitFor: [build-api]

  - name: gcr.io/cloud-builders/docker
    id: push-web
    args: [push, --all-tags, $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WEB_SERVICE]
    waitFor: [build-web]

  - name: gcr.io/cloud-builders/docker
    id: push-workers
    args: [push, --all-tags, $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WORKERS_SERVICE]
    waitFor: [build-workers]

  # ── 6. Deploy Api to Cloud Run ────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-api
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_API_SERVICE
      - --image=$_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_API_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$_SQL_INSTANCE
      - --set-env-vars=ASPNETCORE_ENVIRONMENT=Production,GcpProjectId=$_PROJECT_ID
    waitFor: [push-api, iam-secret-bindings, iam-cloudsql-binding]

  # ── 7. Deploy Web to Cloud Run ────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-web
    entrypoint: bash
    args:
      - -c
      - |
        API_URL=$(gcloud run services describe $_API_SERVICE \
          --region=$_REGION --format="value(status.url)" 2>/dev/null)
        if [ -z "$$API_URL" ]; then
          API_URL="https://$_API_SERVICE-366531512101.$_REGION.run.app"
        fi
        gcloud run deploy $_WEB_SERVICE \
          --image=$_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WEB_SERVICE:$SHORT_SHA \
          --region=$_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars=ASPNETCORE_ENVIRONMENT=Production,ApiBaseUrl=$$API_URL
    waitFor: [push-web, deploy-api]

  # ── 8. Deploy Workers to Cloud Run ────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-workers
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_WORKERS_SERVICE
      - --image=$_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WORKERS_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --add-cloudsql-instances=$_SQL_INSTANCE
      - --set-env-vars=ASPNETCORE_ENVIRONMENT=Production,GcpProjectId=$_PROJECT_ID
      - --min-instances=1
    waitFor: [push-workers, iam-secret-bindings, iam-cloudsql-binding]

images:
  - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_API_SERVICE:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WEB_SERVICE:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$_PROJECT_ID/command-center/$_WORKERS_SERVICE:$SHORT_SHA
